<!DOCTYPE html>
<html lang="pt-bt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title>AluraPlay</title>
</head>
<body>
    <header class="cabecalho">
        <nav class="cabecalho__navegacao">
            <img src="./IMG/Logo_Final 1.svg" alt="Logo Alura Play" class="cabecalho__img-logo">

            <div class="container__campo-navegacao">
                <div class="cabecalho__campo-navegacao">
                    <input type="text" class="campo-navegacao__input" placeholder="Pesquisar">
                    <img src="./IMG/keyboard.svg" alt="Icone de teclado" class="campo-navegacao__icone">
                    <button class="campo-navegacao__botao"><img src="./IMG/search.svg" alt="Icone de pesquisa" class="campo-navegacao__botao__img"></button>
                </div>
                <button class="botao-audio"><img src="./IMG/mic.svg" alt="Icone de microfone"></button>
            </div>

            <div class="cabecalho__navegacao-usuario">
                <img src="./IMG/video_call.svg" alt="Icone de vídeochamada" class="cabecalho__navegacao-usuario__img" id="icone-tablet-desktop">
                <img src="./IMG/apps.svg" alt="Icone de aplicativos" class="cabecalho__navegacao-usuario__img" id="icone-tablet-desktop">
                <img src="./IMG/notifications.svg" alt="Icone de notificação" class="cabecalho__navegacao-usuario__img">
                <img src="./IMG/search.svg" alt="Icone de pesquisa" id="icone-pesquisa" class="cabecalho__navegacao-usuario__img">
                <img src="./IMG/Avatar.svg" alt="Avatar do usuário" id="avatar-usuario" class="cabecalho__navegacao-usuario__img">
            </div>
        </nav>
    </header>

    <main class="conteudo-principal">

    </main>

    <footer class="rodape">

    </footer>
</body>
</html>
